  <style>
    :root { --accent: #00ffcc; --bg: #0b0f14; --card: #121821; }
    body { margin:0; font-family:'Poppins','Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:#fff; padding:20px; }

    .filter-bar { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:30px; }

    .btn-group button { padding:10px; border:none; border-radius:10px; cursor:pointer; font-weight:600; font-size:12px; transition:0.2s; }
    .btn-accept { background:#4caf50; color:white; }
    .btn-reject { background:#f44336; color:white; }
    .btn-wa { background:#25d366; color:white; grid-column: span 2; }

}

.delete-btn:hover{

}

  <script type="module">
import { protectAdminPage, mountAdminLogout } from "./admin-guard.js";
import { auth, db } from "./firebase-config.js";
import { getIdToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  deleteDoc, getDoc, getDocs, 
  collection, onSnapshot, updateDoc, doc, query, where, serverTimestamp, deleteField, setDoc, addDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
let onlineRiders = [];
let ordersUnsub = null;
const FUNCTIONS_BASE_URL = "https://asia-south1-magneetoz.cloudfunctions.net";
protectAdminPage();
mountAdminLogout(document.body);
const riderControlledStatuses = new Set(["Picked Up","Out For Delivery","Reached Nearby","Collect Payment","Payment Completed","Delivered"]);
const STATUS_FLOW = ["Payment Pending","Pending","Accepted","Preparing","Ready","Searching For Rider","Rider Accepted","Picked Up","Out For Delivery","Reached Nearby","Payment Completed","Delivered"];

function logStructured(scope, detail = {}){
  console.info(`[${scope}]`, detail);
}

function normalizeStatus(status){
  const key = String(status || "").toLowerCase();
  const map = {
    payment_pending:"Payment Pending",
    placed:"Pending",
    restaurant_accepted:"Accepted",
    preparing:"Preparing",
    ready_for_pickup:"Ready",
    rider_searching:"Searching For Rider",
    rider_assigned:"Rider Accepted",
    rider_accepted:"Rider Accepted",
    rider_arrived_restaurant:"Rider Accepted",
    picked_up:"Picked Up",
    out_for_delivery:"Out For Delivery",
    arrived_customer:"Reached Nearby",
    delivered:"Delivered",
    cancelled:"Cancelled",
    failed:"Failed"
  };
  if(map[key]) return map[key];
  if(status === "Ready") return "Ready";
  if(status === "Assigned To Delivery Boy") return "Rider Accepted";
  if(status === "Collect Payment") return "Reached Nearby";
  return status || "Pending";
}

function statusRank(status){
  const index = STATUS_FLOW.indexOf(normalizeStatus(status));
  return index < 0 ? 0 : index;
}

function toast(message){
  const node = document.getElementById("opsToast");
  node.textContent = message;
  node.classList.add("show");
  clearTimeout(node._t);
  node._t = setTimeout(() => node.classList.remove("show"), 2600);
}

async function callAdminFunction(name, payload = {}, timeoutMs = 25000){
  const user = auth.currentUser;
  if(!user) throw new Error("Please login again.");
  const token = await getIdToken(user, true);
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try{
    const response = await fetch(`${FUNCTIONS_BASE_URL}/${name}`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${token}`
      },
      body:JSON.stringify(payload),
      signal:controller.signal
    });
    const data = await response.json().catch(() => ({}));
    if(!response.ok || data.ok === false) throw new Error(data.error || "Request failed.");
    return data;
  }finally{
    clearTimeout(timer);
  }
}

function formatCurrency(amount){
  return new Intl.NumberFormat("en-IN", {
    style:"currency",
    currency:"INR",
    maximumFractionDigits:0
  }).format(Number(amount) || 0);
}

function paymentBadge(order = {}){
  const method = String(order.paymentMethod || order.paymentMode || "").toLowerCase();
  const status = String(order.paymentStatus || "").toLowerCase();
  const captured = order.paymentCaptured === true || !!order.razorpayPaymentId;
  if((method === "online" || method === "upi") && (status === "paid" || captured)){
    return { cls:"paid", label:"PAID ONLINE" };
  }
  if(method === "cod" || method === "cash"){
    return { cls:"cod", label:"COD" };
  }
  return { cls:"pending", label:"PAYMENT PENDING" };
}

function isPaidOnline(order = {}){
  const badge = paymentBadge(order);
  return badge.cls === "paid";
}

function isUnpaidOnline(order = {}){
  const method = String(order.paymentMethod || order.paymentMode || "").toLowerCase();
  const status = String(order.paymentStatus || "").toLowerCase();
  return (method === "online" || method === "upi") && status !== "paid" && order.paymentCaptured !== true && !order.razorpayPaymentId;
}

function tsMillis(value){
  if(!value) return 0;
  if(typeof value.toMillis === "function") return value.toMillis();
  if(value.seconds) return Number(value.seconds) * 1000;
  const parsed = Date.parse(value);
  return Number.isFinite(parsed) ? parsed : 0;
}

function riderPresence(rider = {}){
  const onlineFlag = rider.online === true
    || rider.isOnline === true
    || rider.status === "online"
    || rider.availabilityStatus === "online";
  const lastSeen = Math.max(
    tsMillis(rider.lastSeenAt),
    tsMillis(rider.lastLocationUpdateAt),
    tsMillis(rider.location?.updatedAt),
    tsMillis(rider.currentLocation?.updatedAt)
  );
  const stale = onlineFlag && lastSeen && Date.now() - lastSeen > 5 * 60 * 1000;
  const busy = !!(rider.currentActiveOrderId || rider.activeOrderId);
  return {
    onlineFlag,
    stale,
    busy,
    assignable:onlineFlag && !stale && !busy,
    label:!onlineFlag ? "Offline" : stale ? "Location stale" : busy ? "Busy" : "Online"
  };
}

window.sendToRider = async function(id){
  await updateDoc(doc(db, "orders", id), {
    sentToRider: true
  });
}

onSnapshot(doc(db,"settings","restaurant"), snap => {
  const data = snap.exists() ? snap.data() : {};
  document.getElementById("closeTime").value = data.closeTime || "02:00";
  document.getElementById("openTime").value = data.openTime || "08:00";
  document.getElementById("unavailableMessage").value = data.unavailableMessage || "Restaurant currently closed";
  document.getElementById("autoCloseEnabled").checked = data.autoCloseEnabled !== false;
  document.getElementById("maintenanceMode").checked = data.maintenanceMode === true;
  document.getElementById("restaurantLatitude").value = data.location?.lat ?? "";
  document.getElementById("restaurantLongitude").value = data.location?.lng ?? "";
});

async function writeRestaurantSettings(extra = {}){
  await setDoc(doc(db,"settings","restaurant"), {
    restaurantOpen:true,
    unavailableMessage:document.getElementById("unavailableMessage").value || "Restaurant currently closed",
    autoCloseEnabled:document.getElementById("autoCloseEnabled").checked,
    closeTime:document.getElementById("closeTime").value || "02:00",
    openTime:document.getElementById("openTime").value || "08:00",
    maintenanceMode:document.getElementById("maintenanceMode").checked,
    lastUpdatedAt:serverTimestamp(),
    ...extra
  }, { merge:true });
  toast("Restaurant settings updated");
}

window.setRestaurantOpen = open => writeRestaurantSettings({ restaurantOpen:open, maintenanceMode:open ? false : document.getElementById("maintenanceMode").checked });
window.saveRestaurantSettings = () => writeRestaurantSettings();
window.saveRestaurantLocation = async function(){
  const lat = Number(document.getElementById("restaurantLatitude").value);
  const lng = Number(document.getElementById("restaurantLongitude").value);
  if(!Number.isFinite(lat) || !Number.isFinite(lng)){
    alert("Enter valid latitude and longitude.");
    return;
  }
  await setDoc(doc(db,"settings","restaurant"), {
    location:{ lat, lng },
    lastLocationUpdatedAt:serverTimestamp()
  }, { merge:true });
  const saved = await getDoc(doc(db,"settings","restaurant"));
  const savedLocation = saved.data()?.location || {};
  if(Number(savedLocation.lat) !== lat || Number(savedLocation.lng) !== lng){
    throw new Error("Restaurant location save verification failed.");
  }
  toast("Restaurant location saved");
};

window.useCurrentRestaurantLocation = async function(){
  if(!navigator.geolocation){
    alert("Location is not supported on this device/browser.");
    return;
  }
  const ok = confirm("Stand at the restaurant/store location, then allow location access. Use this device's live location as restaurant location?");
  if(!ok) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = Number(pos.coords.latitude.toFixed(6));
    const lng = Number(pos.coords.longitude.toFixed(6));
    document.getElementById("restaurantLatitude").value = lat;
    document.getElementById("restaurantLongitude").value = lng;
    await saveRestaurantLocation();
  }, error => {
    alert(error?.message || "Unable to fetch current location.");
  }, {
    enableHighAccuracy:true,
    timeout:20000,
    maximumAge:0
  });
};

window.deleteAllOrders = async function(){

  if(!(await window.MagneetozNotify.confirm("Delete ALL Online Orders?", { title:"Delete orders", okText:"Delete" }))) return;

  const q = query(
    collection(db,"orders"),
    where("orderSource","==","online")
  );

  const snapshot = await getDocs(q);

  const promises = snapshot.docs.map(docSnap => 
    deleteDoc(doc(db,"orders",docSnap.id))
  );

  await Promise.all(promises);

  alert("All Online Orders Deleted");

} 



window.loadOrders = function(filter) {
  const q = query(collection(db, "orders"), where("orderSource", "==", "online"));
  ordersUnsub?.();
  ordersUnsub = onSnapshot(q, (snap) => {
    const container = document.getElementById("orders");
    container.innerHTML = "";
    const docs = [];
    snap.forEach(docSnap => docs.push(docSnap));
    docs
      .sort((a,b) => tsMillis(b.data().createdAt) - tsMillis(a.data().createdAt))
      .forEach(docSnap => {
      const d = docSnap.data();
      const displayStatus = normalizeStatus(d.status || d.orderStatus || "Pending");
      const method = String(d.paymentMethod || d.paymentMode || "").toLowerCase();
      const paidOnline = (method === "online" || method === "upi") && (String(d.paymentStatus || "").toLowerCase() === "paid" || d.paymentCaptured === true || !!d.razorpayPaymentId);
      const pendingOnlineDraft = (method === "online" || method === "upi") && !paidOnline;
      if(pendingOnlineDraft && filter !== "Payment Pending") return;
      if (filter !== "All" && displayStatus !== normalizeStatus(filter)) return;
      const badge = paymentBadge(d);
      const paymentLocked = isUnpaidOnline(d);
      
      container.innerHTML += `
        <div class="order-card">
          <span class="status-badge ${displayStatus}">${displayStatus}</span>
          <span class="payment-badge ${badge.cls}">${badge.label}</span>
          <h3>#${d.orderNumber || d.orderId} - ${d.customerName}</h3>
          <div class="info-row">📞 ${d.phone}</div>
          <div class="info-row">🏠 ${d.address}</div>
          <div class="items-list">${d.items.map(i => `• ${i.name} (x${i.qty})`).join('<br>')}</div>
          <div style="font-weight:700; color:var(--accent);">Total: ${formatCurrency(d.totalAmount)}</div>
          <div class="assigned-rider">Payment: ${d.paymentStatus || "pending"} ${d.paymentMethod ? `(${d.paymentMethod})` : ""}<br>Amount to collect: ${formatCurrency(d.amountToCollect ?? d.totalAmount ?? 0)}<br>Coupon: ${d.couponCode || "None"} ${d.couponDiscount ? `- ${formatCurrency(d.couponDiscount)}` : ""}</div>
          ${d.riderName || d.assignedRider?.name ? `<div class="assigned-rider">Rider: ${d.riderName || d.assignedRider.name}<br>${d.riderPhone || d.assignedRider?.phone || ""}</div>` : ""}
          <div class="btn-group status-grid">

  <button
    class="btn-status ${paymentLocked ? "locked" : ""}"
    ${paymentLocked ? `title="Online payment is not confirmed yet" onclick="paymentPendingLocked()"` : `onclick="updateStatus('${docSnap.id}','Accepted')"`}>

    ✅ Accept

  </button>

  <button
    class="btn-status ${paymentLocked ? "locked" : ""}"
    ${paymentLocked ? `title="Online payment is not confirmed yet" onclick="paymentPendingLocked()"` : `onclick="updateStatus('${docSnap.id}','Preparing')"`}>

    👨‍🍳 Preparing

  </button>

  <button
    class="btn-status ${paymentLocked ? "locked" : ""}"
    ${paymentLocked ? `title="Online payment is not confirmed yet" onclick="paymentPendingLocked()"` : `onclick="markReadyForPickup('${docSnap.id}')"`}>

    ✅ Ready

  </button>

  <button
    class="btn-status"
    onclick="requestNearbyRiders('${docSnap.id}')">

    🚚 Searching For Rider

  </button>

  <button
    class="btn-status"
    onclick="openManualAssign('${docSnap.id}')">

    Assign Rider

  </button>

  <button class="btn-status locked" title="Controlled by Rider" onclick="lockedRiderStage()">🔒 Picked Up</button>
  <button class="btn-status locked" title="Controlled by Rider" onclick="lockedRiderStage()">🔒 Out For Delivery</button>
  <button class="btn-status locked" title="Controlled by Rider" onclick="lockedRiderStage()">🔒 Nearby</button>
  <button class="btn-status locked" title="Controlled by Rider" onclick="lockedRiderStage()">🔒 Payment Done</button>
  <button class="btn-status btn-delivered locked" title="Controlled by Rider" onclick="lockedRiderStage()">🔒 Delivered</button>

  <button
    class="btn-status btn-reject"
    onclick="updateStatus('${docSnap.id}','Rejected')">

    ❌ Reject

  </button>

</div>
        </div>`;
    });
  }, error => console.warn("[FIRESTORE LISTENER] Admin orders failed", error));
}

window.updateStatus = async (id, s) => {
  if(riderControlledStatuses.has(s)){
    lockedRiderStage();
    return;
  }
  const orderRef = doc(db, "orders", id);
  const nextStatus = normalizeStatus(s);
  const existing = await runTransaction(db, async transaction => {
    const orderSnap = await transaction.get(orderRef);
    if(!orderSnap.exists()) throw new Error("Order not found.");
    const current = orderSnap.data();
    if(isUnpaidOnline(current)){
      throw new Error("Online payment is not confirmed yet. Do not accept or assign this order.");
    }
    if(!["Rejected","Cancelled"].includes(nextStatus) && statusRank(nextStatus) < statusRank(current.status)){
      throw new Error(`Cannot move order backwards from ${current.status} to ${nextStatus}.`);
    }
    const updates = { status: nextStatus, orderStatus:nextStatus, lastStatusUpdatedAt:serverTimestamp() };
    if(nextStatus === "Accepted") updates.acceptedAt = serverTimestamp();
    if(nextStatus === "Preparing") updates.preparingAt = serverTimestamp();
    if(nextStatus === "Searching For Rider") updates.readyAt = serverTimestamp();
    if(nextStatus === "Rejected" || nextStatus === "Cancelled" || nextStatus === "Delivered"){
      updates.completedAt = serverTimestamp();
    }
    transaction.update(orderRef, updates);
    return current;
  });
  logStructured("ORDER STATUS", { orderId:id, status:nextStatus });
  if((s === "Rejected" || s === "Cancelled" || s === "Delivered") && (existing.assignedRiderId || existing.riderId)){
    await updateDoc(doc(db, "riders", existing.assignedRiderId || existing.riderId), {
      currentActiveOrderId: deleteField(),
      activeOrderId: deleteField(),
      isAvailable:true
    });
  }
};

window.lockedRiderStage = function(){
  toast("Delivery stages are controlled by rider");
};

window.paymentPendingLocked = function(){
  toast("Online payment is not confirmed yet.");
};

window.markReadyForPickup = async function(orderId){
  const orderRef = doc(db, "orders", orderId);
  await runTransaction(db, async transaction => {
    const orderSnap = await transaction.get(orderRef);
    if(!orderSnap.exists()) throw new Error("Order not found.");
    const current = orderSnap.data();
    if(isUnpaidOnline(current)){
      throw new Error("Online payment is not confirmed yet. Do not mark ready.");
    }
    logStructured("ORDER READY", {
      orderId,
      oldStatus:current.status || "",
      newStatus:"ready_for_pickup",
      assignedRiderId:current.assignedRiderId || current.riderId || ""
    });
    transaction.update(orderRef, {
      status:"ready_for_pickup",
      orderStatus:"ready_for_pickup",
      deliveryStatus:"ready_for_pickup",
      readyAt:serverTimestamp(),
      lastStatusUpdatedAt:serverTimestamp()
    });
  });
  toast("Order marked ready for pickup");
};

window.fixCapturedPaymentOrders = async function(){
  const snapshot = await getDocs(query(collection(db, "orders"), where("orderSource", "==", "online")));
  const fixes = [];
  snapshot.forEach(docSnap => {
    const order = docSnap.data();
    const status = String(order.paymentStatus || "").toLowerCase();
    const captured = order.paymentCaptured === true || !!order.razorpayPaymentId;
    if(captured && status !== "paid"){
      fixes.push(updateDoc(doc(db, "orders", docSnap.id), {
        paymentStatus:"paid",
        paymentMethod:"online",
        paymentCaptured:true,
        amountToCollect:0,
        paymentStage:"Payment Completed",
        lastStatusUpdatedAt:serverTimestamp()
      }));
    }
  });
  await Promise.all(fixes);
  logStructured("PAYMENT MIGRATION", { fixed:fixes.length });
  toast(`Fixed ${fixes.length} paid online order(s).`);
};

function riderOnline(rider){
  return riderPresence(rider).assignable;
}

window.runSystemIntegrityCheck = async function(){
  try{
    toast("Checking system integrity...");
    const result = await callAdminFunction("systemIntegrityCheck", { repair:true }, 60000);
    const stale = result.issues?.staleRiderLocks?.length || 0;
    const missingRiders = result.issues?.assignedToMissingRider?.length || 0;
    const missingPayment = result.issues?.missingPaymentStatus?.length || 0;
    const invalidStatus = result.issues?.invalidOrderStatus?.length || 0;
    const repaired = result.repairs?.length || 0;
    alert(`System Integrity Check complete\n\nStale rider locks: ${stale}\nAssigned to missing rider: ${missingRiders}\nMissing payment status: ${missingPayment}\nInvalid order status: ${invalidStatus}\nAuto repairs: ${repaired}`);
    toast(`Integrity check repaired ${repaired} issue(s).`);
  }catch(error){
    alert(error.message || "System integrity check failed.");
  }
};

onSnapshot(collection(db,"riders"), snap => {
  onlineRiders = snap.docs
    .map(item => ({ id:item.id, ...item.data() }))
    .filter(rider => rider.approved === true && rider.active !== false && riderOnline(rider));
});

window.openManualAssign = async function(orderId){
  const candidates = onlineRiders;
  if(!candidates.length){
    alert("No active riders are online.");
    return;
  }
  const list = candidates
    .map((rider, index) => {
      const presence = riderPresence(rider);
      return `${index + 1}. ${rider.name || rider.riderName || "Magneetoz Rider"} (${rider.phone || rider.phoneDigits || "no phone"}) - ${presence.label}`;
    })
    .join("\n");
  const choice = prompt(`Assign order to rider:\n\n${list}\n\nEnter rider number`);
  if(!choice) return;
  const rider = candidates[Number(choice) - 1];
  if(!rider){
    alert("Invalid rider selection.");
    return;
  }
  await assignSpecificRider(orderId, rider);
};

async function assignSpecificRider(orderId, rider){
  try{
    const presence = riderPresence(rider);
    const overrideOffline = !presence.onlineFlag
      ? confirm("Selected rider is offline. Assign anyway?")
      : false;
    const result = await callAdminFunction("assignRiderToOrder", { orderId, riderId:rider.id, overrideOffline });
    toast(result.skipped ? "Rider already assigned" : (result.message || "Rider assigned successfully."));
  }catch(error){
    alert(error.message || "Unable to assign rider.");
  }
}

window.requestNearbyRiders = async function(orderId){
  const orderRef = doc(db, "orders", orderId);
  const orderSnap = await getDoc(orderRef);
  if(!orderSnap.exists()){
    alert("Order not found.");
    return;
  }
  const order = orderSnap.data();
  if(isUnpaidOnline(order)){
    alert("Online payment is not confirmed yet. Do not assign rider.");
    return;
  }
  if(!["Accepted","Preparing","Ready","ready_for_pickup","Searching For Rider","rider_searching"].includes(order.status)){
    alert("Accept or mark order Preparing before searching rider.");
    return;
  }
  if(order.assignedRiderId || order.riderId){
    alert("A rider is already assigned.");
    return;
  }
  const paymentFix = {};
  const badge = paymentBadge(order);
  if(badge.cls === "paid"){
    paymentFix.paymentStatus = "paid";
    paymentFix.paymentMethod = "online";
    paymentFix.paymentCaptured = true;
    paymentFix.amountToCollect = 0;
  }
  logStructured("RIDER ASSIGNMENT", {
    orderId,
    candidates:"backend_route_selection_pending",
    paymentStatus:paymentFix.paymentStatus || order.paymentStatus || "pending",
    amountToCollect:paymentFix.amountToCollect ?? order.amountToCollect ?? order.totalAmount ?? 0
  });

  try{
    const result = await callAdminFunction("assignRiderToOrder", { orderId });
    if(Object.keys(paymentFix).length){
      await updateDoc(orderRef, paymentFix);
    }
    toast(result.skipped ? "Rider already assigned" : (result.message || `Rider request sent: ${result.riderName || "Magneetoz Rider"}`));
  }catch(error){
    alert(error.message || "No rider is online right now.");
  }
  logStructured("RIDER MATCHING", { orderId, source:"backend_google_routes" });
};
