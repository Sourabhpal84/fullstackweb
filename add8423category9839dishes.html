// 🔥 SAME FIREBASE (NO CHANGE)
import { protectAdminPage, mountAdminLogout } from "./admin-guard.js";
import { auth, db, storage } from "./firebase-config.js";
import {
  collection, addDoc, updateDoc,
  deleteDoc, doc, onSnapshot, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getDownloadURL,
  ref,
  uploadBytesResumable
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

protectAdminPage();
mountAdminLogout(document.body);

let isSorting = false;
let uploadedDishImageUrl = "";
let uploadedCategoryImageUrl = "";
let uploadedDishImageSet = null;
let uploadedCategoryImageSet = null;
let activeUploadTask = null;
const IMAGE_VARIANTS = [
  { key:"thumbnail", width:200, quality:.7, target:120 * 1024 },
  { key:"mobile", width:400, quality:.74, target:220 * 1024 },
  { key:"tablet", width:800, quality:.72, target:340 * 1024 },
  { key:"desktop", width:1200, quality:.68, target:400 * 1024 }
];

const UPLOAD_DEBUG = true;

function uploadLog(event, detail = {}){
  if(UPLOAD_DEBUG) console.info("[IMAGE_UPLOAD]", { event, ...detail });
}

function formatBytes(bytes = 0){
  const value = Number(bytes) || 0;
  if(value < 1024) return `${value} B`;
  if(value < 1024 * 1024) return `${Math.round(value / 1024)} KB`;
  return `${(value / (1024 * 1024)).toFixed(2)} MB`;
}

function firebaseUploadMessage(error){
  const code = error?.code || "";
  const message = error?.message || String(error || "Upload failed");
  const map = {
    "storage/unauthorized":"Storage permission denied. Login as admin and deploy storage.rules.",
    "storage/canceled":"Upload was canceled. Please retry.",
    "storage/retry-limit-exceeded":"Network retry limit exceeded. Check internet and retry.",
    "storage/quota-exceeded":"Firebase Storage quota exceeded.",
    "storage/object-not-found":"Uploaded object was not found after upload.",
    "storage/unknown":"Firebase Storage returned an unknown error. Check bucket and rules."
  };
  return map[code] || message;
}

function waitForAdminUser(timeoutMs = 8000){
  if(auth.currentUser) return Promise.resolve(auth.currentUser);
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      unsubscribe();
      reject(new Error("Admin login not ready. Please login again, then retry upload."));
    }, timeoutMs);
    const unsubscribe = onAuthStateChanged(auth, user => {
      clearTimeout(timer);
      unsubscribe();
      user ? resolve(user) : reject(new Error("No authenticated admin user found. Please login again."));
    }, error => {
      clearTimeout(timer);
      unsubscribe();
      reject(error);
    });
  });
}

function formatCurrency(amount){
  return new Intl.NumberFormat("en-IN", {
    style:"currency",
    currency:"INR",
    maximumFractionDigits:0
  }).format(Number(amount) || 0);
}

function normalizeUnicodeText(value = ""){
  return String(value || "").normalize("NFC").trim();
}

function escapeHTML(value = ""){
  return String(value || "").replace(/[&<>"']/g, char => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#39;"
  }[char]));
}

function numberValue(value, fallback = 0){
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : fallback;
}

const uploadBox = document.getElementById("dishUploadBox");
const fileInput = document.getElementById("dishImageFile");

function setUploadStatus(message, pct = null){

}

function setCategoryUploadStatus(message, pct = null){

  if(pct != null) categoryProgress.style.width = `${pct}%`;
}

function loadImageFile(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      resolve({ img, url, width:img.naturalWidth || img.width, height:img.naturalHeight || img.height });
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("Could not read image."));
    };
    img.src = url;
  });
}

function canvasToBlob(canvas, type = "image/webp", quality = .78){
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

async function makeImageVariant(source, width, quality){
  const scale = Math.min(1, width / source.width);
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(source.width * scale));
  canvas.height = Math.max(1, Math.round(source.height * scale));
  const ctx = canvas.getContext("2d", { alpha:false });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(source.img, 0, 0, canvas.width, canvas.height);
  const webp = await canvasToBlob(canvas, "image/webp", quality);
  if(webp) return { blob:webp, ext:"webp", contentType:"image/webp", width:canvas.width, height:canvas.height };
  const jpeg = await canvasToBlob(canvas, "image/jpeg", quality);
  return { blob:jpeg, ext:"jpg", contentType:"image/jpeg", width:canvas.width, height:canvas.height };
}

async function makeTargetImageVariant(source, spec){
  let quality = spec.quality;
  let variant = await makeImageVariant(source, spec.width, quality);
  while(variant.blob?.size > spec.target && quality > .44){
    quality = Math.round((quality - .08) * 100) / 100;
    variant = await makeImageVariant(source, spec.width, quality);
  }
  return variant;
}

async function uploadBlobWithProgress(path, blob, contentType, onProgress, timeoutMs = 30000){
  const user = await waitForAdminUser();
  const storageRef = ref(storage, path);
  uploadLog("upload_start", {
    uid:user.uid,
    email:user.email,
    bucket:storage.app?.options?.storageBucket || "unknown",
    fullPath:path,
    size:formatBytes(blob.size),
    contentType
  });
  const task = uploadBytesResumable(storageRef, blob, {
    contentType,
    cacheControl:"public,max-age=31536000,immutable"
  });
  const uploadPromise = new Promise((resolve, reject) => {
    task.on("state_changed", snap => {
      const pct = snap.totalBytes ? Math.round((snap.bytesTransferred / snap.totalBytes) * 100) : 0;
      uploadLog("upload_progress", {
        fullPath:path,
        pct,
        bytesTransferred:snap.bytesTransferred,
        totalBytes:snap.totalBytes
      });
      onProgress?.(pct);
    }, error => {
      uploadLog("upload_error", {
        fullPath:path,
        code:error?.code || "",
        message:error?.message || String(error)
      });
      reject(error);
    }, resolve);
  });
  const timeoutPromise = new Promise((_, reject) => {
    setTimeout(() => {
      try{ task.cancel(); }catch(_){}
      reject(new Error(`Storage upload timeout after ${Math.round(timeoutMs / 1000)}s for ${path}`));
    }, timeoutMs);
  });
  await Promise.race([uploadPromise, timeoutPromise]);
  if(task.snapshot.bytesTransferred !== task.snapshot.totalBytes){
    throw new Error(`Upload incomplete: ${task.snapshot.bytesTransferred}/${task.snapshot.totalBytes} bytes`);
  }
  const url = await getDownloadURL(task.snapshot.ref);
  if(!url) throw new Error("Download URL was not generated.");
  uploadLog("upload_complete", { fullPath:path, url });
  return url;
}

async function createAndUploadImageSet(file, folder, statusFn){
  const user = await waitForAdminUser();
  const source = await loadImageFile(file);
  const baseName = `${Date.now()}-${file.name.replace(/[^a-z0-9]/gi, "-").toLowerCase().replace(/-+/g, "-")}`;
  const variants = {};
  let fallback = "";
  try{
    uploadLog("firebase_ready", {
      uid:user.uid,
      email:user.email,
      bucket:storage.app?.options?.storageBucket || "unknown",
      projectId:storage.app?.options?.projectId || "unknown"
    });
    uploadLog("file_before_optimization", {
      name:file.name,
      size:formatBytes(file.size),
      type:file.type,
      width:source.width,
      height:source.height,
      targetFolder:folder
    });
    statusFn("Optimizing WebP sizes...", 8);
    const prepared = [];
    for(let i = 0; i < IMAGE_VARIANTS.length; i++){
      const spec = IMAGE_VARIANTS[i];
      statusFn(`Optimizing ${spec.key}...`, 8 + Math.round((i / IMAGE_VARIANTS.length) * 35));
      const variant = await makeTargetImageVariant(source, spec);
      uploadLog("file_after_optimization", {
        variant:spec.key,
        width:variant.width,
        height:variant.height,
        size:formatBytes(variant.blob?.size),
        contentType:variant.contentType
      });
      prepared.push({ spec, variant });
    }
    const primary = prepared.find(item => item.spec.key === "mobile") || prepared[0];
    statusFn("Uploading mobile optimized image...", 48);
    const primaryUrl = await uploadBlobWithProgress(
      `${folder}/${baseName}/${primary.spec.key}-${primary.variant.width}.${primary.variant.ext}`,
      primary.variant.blob,
      primary.variant.contentType,
      pct => statusFn(`Uploading ${primary.spec.key} ${pct}%`, 48 + Math.round(pct * .3)),
      30000
    );
    variants[primary.spec.key] = {
      url:primaryUrl,
      width:primary.variant.width,
      height:primary.variant.height,
      contentType:primary.variant.contentType
    };
    fallback = primaryUrl;

    statusFn("Uploading remaining sizes...", 78);
    const remaining = prepared.filter(item => item !== primary);
    const uploads = await Promise.allSettled(remaining.map(({ spec, variant }, index) =>
      uploadBlobWithProgress(
        `${folder}/${baseName}/${spec.key}-${variant.width}.${variant.ext}`,
        variant.blob,
        variant.contentType,
        pct => statusFn(`Uploading ${spec.key} ${pct}%`, 78 + Math.round(((index + pct / 100) / Math.max(1, remaining.length)) * 18)),
        30000
      ).then(url => ({ spec, variant, url }))
    ));
    uploads.forEach(result => {
      if(result.status !== "fulfilled"){
        uploadLog("variant_upload_skipped", {
          code:result.reason?.code || "",
          message:result.reason?.message || String(result.reason)
        });
        return;
      }
      const { spec, variant, url } = result.value;
      variants[spec.key] = { url, width:variant.width, height:variant.height, contentType:variant.contentType };
    });
    statusFn("Optimized images ready.", 100);
    return {
      url:fallback || variants.desktop?.url || variants.thumbnail?.url || "",
      variants,
      width:source.width,
      height:source.height,
      storageFolder:`${folder}/${baseName}`,
      optimized:true,
      createdAt:Date.now()
    };
  }finally{
    URL.revokeObjectURL(source.url);
  }
}

function compressImageToDataUrl(file, maxWidth = 900, quality = .78){
  return loadImageFile(file).then(async source => {
    try{
      const variant = await makeImageVariant(source, maxWidth, quality);
      return await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(variant.blob);
      });
    }finally{
      URL.revokeObjectURL(source.url);
    }
  });
}

async function useCompressedFallback(file, reason = "Firebase Storage is taking too long."){
  const dataUrl = await compressImageToDataUrl(file);
  uploadedDishImageUrl = dataUrl;
  uploadedDishImageSet = null;
  document.getElementById("image").value = dataUrl;
  setUploadStatus(`${reason} Compressed image is ready.`, 100);
}

async function useCompressedCategoryFallback(file, reason = "Firebase Storage upload failed."){
  const dataUrl = await compressImageToDataUrl(file, 420, .78);
  uploadedCategoryImageUrl = dataUrl;
  uploadedCategoryImageSet = null;
  document.getElementById("catImage").value = dataUrl;
  setCategoryUploadStatus(`${reason} Compressed image is ready.`, 100);
}

async function uploadDishImage(file){
  if(!file || !file.type.startsWith("image/")){
    alert("Please choose a valid image.");
    return;
  }
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
  prompt.style.display = "none";
  setUploadStatus("Optimizing image...", 4);
  try{
    uploadedDishImageSet = await createAndUploadImageSet(file, "dishes", setUploadStatus);
    uploadedDishImageUrl = uploadedDishImageSet.url;
    document.getElementById("image").value = uploadedDishImageUrl;
    setUploadStatus("Upload complete. Responsive WebP images ready.", 100);
  }catch(error){
    console.error("Dish image upload failed:", error);
    await useCompressedFallback(file, error?.message || "Firebase Storage upload failed.");
    alert(firebaseUploadMessage(error));
  }
}

async function uploadCategoryImage(file){

  categoryPreview.src = URL.createObjectURL(file);

  categoryPrompt.style.display = "none";
  setCategoryUploadStatus("Optimizing image...", 4);

    uploadedCategoryImageSet = await createAndUploadImageSet(file, "categories", setCategoryUploadStatus);
    uploadedCategoryImageUrl = uploadedCategoryImageSet.url;
    document.getElementById("catImage").value = uploadedCategoryImageUrl;
    setCategoryUploadStatus("Upload complete. Category WebP images ready.", 100);
  }catch(error){
    console.error("Category image upload failed:", error);
    await useCompressedCategoryFallback(file, error?.message || "Firebase Storage upload failed.");
    alert(firebaseUploadMessage(error));
  }
}

/* ➕ CATEGORY */
window.addCategory = async function(){
  const mainType = normalizeUnicodeText(mainTypeName.value);
  const mainImage = normalizeUnicodeText(mainTypeImage.value || uploadedCategoryImageUrl || catImage.value);
  const cleanName = normalizeUnicodeText(catName.value);
  const image = normalizeUnicodeText(uploadedCategoryImageUrl || catImage.value);
  if(!mainType) return alert("Enter Food Button Name e.g. Pizza, Burger ❌");
  if(!cleanName) return alert("Enter name ❌");

  const snap = await getDocs(collection(db,"categories"));

await addDoc(collection(db,"categories"),{
  name: cleanName,
  image,
  imageSet: uploadedCategoryImageSet,
  parent: mainType,
  group: mainType,
  mainCategory: mainType,
  groupImage: mainImage,
  groupImageSet: mainImage === uploadedCategoryImageSet?.url ? uploadedCategoryImageSet : null,
  active:true,
  order: snap.size + 1   // ⭐ IMPORTANT
});

  mainTypeName.value="";
  mainTypeImage.value="";
  catName.value="";
  catImage.value="";
  uploadedCategoryImageUrl = "";
  uploadedCategoryImageSet = null;
  categoryPreview.style.display = "none";
  categoryPrompt.style.display = "block";
  setCategoryUploadStatus("Firebase Storage upload ready", 0);
}

/* 📋 CATEGORY LIST */
onSnapshot(collection(db,"categories"), snap=>{

  let html="";

  const categoryList = document.getElementById("categoryList");

  if(select) select.innerHTML="";

  snap.forEach(docSnap=>{

    html+=`
    <div class="card" data-id="${docSnap.id}" style="display:flex;align-items:center;gap:12px;">

    <!-- ☰ HANDLE -->
    <span class="drag-handle" style="cursor:grab;font-size:22px;">☰</span>

    <!-- CONTENT -->

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">

    </span>

      style="background:${c.active ? '#22c55e' : '#facc15'}; color:black;"
      onclick="toggleCat('${docSnap.id}',${c.active})">

    <button class="btn-red"
      onclick="deleteCategory('${docSnap.id}','${c.name}')">
      Delete
    </button>

  </div>

</div>
`;
  });

  if(categoryList && !isSorting){
  categoryList.innerHTML = html;
  initSortable();   // ⭐ yahin call karo
}

});


function initSortable(){

  const el = document.getElementById("categoryList");

  if (!el) return;

  if (el.sortableInstance) {
    el.sortableInstance.destroy();
  }

  el.sortableInstance = new Sortable(el, {
    animation:150,
    handle:".drag-handle",

    onEnd: async function(){

  isSorting = true;   // ⭐ START

  const items = el.querySelectorAll(".card");

  for(let i=0;i<items.length;i++){
    const id = items[i].dataset.id;

    await updateDoc(doc(db,"categories",id),{
      order:i+1
    });
  }

  setTimeout(()=>{
    isSorting = false;   // ⭐ END
  }, 500);
  }
  });
}
/* ➕ DISH */
window.addDish = async function(){

  try{

    const dishName = normalizeUnicodeText(document.getElementById("name").value);
    const img = normalizeUnicodeText(uploadedDishImageUrl || document.getElementById("image").value);
    const descText = normalizeUnicodeText(document.getElementById("desc").value);
    const cat = normalizeUnicodeText(document.getElementById("category").value);
    const t = document.getElementById("type").value;

    if(!dishName || !img){
      alert("Fill name & image ❌");
      return;
    }

    let data = {
      name: dishName,
      image: img,
      imageSet: uploadedDishImageSet,
      category: cat,
      type: t,
      description: descText,
      available: true
    };

    if(t === "simple"){

      const p = document.getElementById("price").value.trim();

      if(!p || isNaN(p)){
        alert("Enter valid price ❌");
        return;
      }

      const market = document.getElementById("marketPrice").value.trim();

     if(!market || isNaN(market)){
     alert("Enter valid market price ❌");
     return;
     }

     data.price = parseInt(p);
     data.marketPrice = parseInt(market);

    } else {

      data.sizes = {
  small: {
    price: +document.getElementById("small").value,
    market: +document.getElementById("smallMarket").value
  },
  medium: {
    price: +document.getElementById("medium").value,
    market: +document.getElementById("mediumMarket").value
  },
  large: {
    price: +document.getElementById("large").value,
    market: +document.getElementById("largeMarket").value
  }
   };
    }

    await addDoc(collection(db,"dishes"), data);

    uploadedDishImageUrl = "";
    uploadedDishImageSet = null;
    document.getElementById("image").value = "";
    fileInput.value = "";
    preview.removeAttribute("src");
    preview.style.display = "none";
    prompt.style.display = "block";
    setUploadStatus("Firebase Storage upload ready", 0);

    alert("Dish Added ✅");

  }catch(e){
    console.error(e);
    alert("Error: " + e.message);
  }
}

/* 📋 DISH LIST (CATEGORY WISE) */
onSnapshot(collection(db,"categories"), (catSnap)=>{

  onSnapshot(collection(db,"dishes"), (dishSnap)=>{

    document.getElementById("list").innerHTML = "";

    catSnap.forEach(catDoc=>{

      const catName = catDoc.data().name;

      let html = `<div class="card"><h3>${catName}</h3>`;

      let hasDish = false;

      dishSnap.forEach(d=>{

        const dish = d.data();

        function format(name){
          return name.replace(/\s/g,'').toLowerCase();
        }

        if(
          dish.category &&
          format(dish.category) === format(catName)
        ){

          hasDish = true;
          const isSizeBased = dish.type === "multiple" || dish.sizes;
          const simplePrice = Number(dish.price || 0);
          const simpleMarket = Number(dish.marketPrice || (simplePrice ? simplePrice + 20 : 0));
          const sizes = dish.sizes || {};
          const small = sizes.small || {};
          const medium = sizes.medium || {};
          const large = sizes.large || {};
          const currentPrice = isSizeBased ? (small.price || medium.price || large.price || 0) : simplePrice;

          html += `
          <div class="dish-row" id="dishRow-${d.id}">
            <div class="dish-row-main">
              <div>
                <strong>${escapeHTML(dish.name || "Untitled dish")}</strong> - ${formatCurrency(currentPrice)}
                <small>${escapeHTML(dish.description || "No description")} • ${isSizeBased ? "Size based" : "Simple"} • ${dish.available ? "Active" : "Disabled"}</small>
              </div>

              <div class="dish-actions">
                <button class="btn-blue" onclick="openDishEditor('${d.id}')">Edit</button>
                <button 
                  style="background:${dish.available ? '#22c55e' : '#facc15'}; color:black;"
                  onclick="toggleDish('${d.id}',${dish.available})">
                  ${dish.available ? "Disable" : "Enable"}
                </button>

                <button class="btn-red"
                  onclick="del('${d.id}')">
                  Delete
                </button>
              </div>
            </div>

            <div class="dish-edit-panel" id="edit-${d.id}">
              <div class="dish-edit-grid">
                <input id="edit-name-${d.id}" value="${escapeHTML(dish.name || "")}" placeholder="Dish name">
                <input id="edit-desc-${d.id}" value="${escapeHTML(dish.description || "")}" placeholder="Description">
                <input id="edit-image-${d.id}" value="${escapeHTML(dish.image || "")}" placeholder="Image URL">
                <select id="edit-category-${d.id}">
                  ${Array.from(document.getElementById("category").options).map(option => `<option value="${escapeHTML(option.value)}" ${option.value === dish.category ? "selected" : ""}>${escapeHTML(option.textContent)}</option>`).join("")}
                </select>
                <select id="edit-type-${d.id}" onchange="toggleDishEditorType('${d.id}')">
                  <option value="simple" ${!isSizeBased ? "selected" : ""}>Simple</option>
                  <option value="multiple" ${isSizeBased ? "selected" : ""}>Size Based</option>
                </select>
              </div>

              <div class="dish-edit-grid" id="edit-simple-${d.id}" style="${isSizeBased ? "display:none" : ""}">
                <input id="edit-price-${d.id}" type="number" value="${simplePrice || ""}" placeholder="Price">
                <input id="edit-market-${d.id}" type="number" value="${simpleMarket || ""}" placeholder="Market price">
              </div>

              <div class="size-edit-grid" id="edit-sizes-${d.id}" style="${isSizeBased ? "" : "display:none"}">
                <label>Small price<input id="edit-small-${d.id}" type="number" value="${small.price || ""}"></label>
                <label>Small market<input id="edit-small-market-${d.id}" type="number" value="${small.market || ""}"></label>
                <label>Medium price<input id="edit-medium-${d.id}" type="number" value="${medium.price || ""}"></label>
                <label>Medium market<input id="edit-medium-market-${d.id}" type="number" value="${medium.market || ""}"></label>
                <label>Large price<input id="edit-large-${d.id}" type="number" value="${large.price || ""}"></label>
                <label>Large market<input id="edit-large-market-${d.id}" type="number" value="${large.market || ""}"></label>
              </div>

              <div>
                <button class="btn-green" onclick="saveDishEdit('${d.id}')">Save Changes</button>
                <button onclick="closeDishEditor('${d.id}')">Cancel</button>
              </div>
            </div>
          </div>`;
        }

      });

      if(!hasDish){
        html += `<p>No dishes</p>`;
      }

      html += `</div>`;

      list.innerHTML += html;

    });

  });

});
/* TOGGLE */
window.toggleDish = async(id,c)=>{
  await updateDoc(doc(db,"dishes",id),{available:!c});
}

window.openDishEditor = function(id){
  document.getElementById(`edit-${id}`)?.classList.add("active");
}

window.closeDishEditor = function(id){
  document.getElementById(`edit-${id}`)?.classList.remove("active");
}

window.toggleDishEditorType = function(id){
  const type = document.getElementById(`edit-type-${id}`)?.value || "simple";
  const simpleBox = document.getElementById(`edit-simple-${id}`);
  const sizeBox = document.getElementById(`edit-sizes-${id}`);
  if(simpleBox) simpleBox.style.display = type === "simple" ? "" : "none";
  if(sizeBox) sizeBox.style.display = type === "multiple" ? "" : "none";
}

window.saveDishEdit = async function(id){
  try{
    const type = document.getElementById(`edit-type-${id}`)?.value || "simple";
    const data = {
      name: normalizeUnicodeText(document.getElementById(`edit-name-${id}`)?.value),
      description: normalizeUnicodeText(document.getElementById(`edit-desc-${id}`)?.value),
      image: normalizeUnicodeText(document.getElementById(`edit-image-${id}`)?.value),
      category: normalizeUnicodeText(document.getElementById(`edit-category-${id}`)?.value),
      type
    };

    if(!data.name || !data.image){
      alert("Dish name aur image required hai ❌");
      return;
    }

    if(type === "simple"){
      const price = numberValue(document.getElementById(`edit-price-${id}`)?.value);
      const marketPrice = numberValue(document.getElementById(`edit-market-${id}`)?.value);
      if(!price || !marketPrice){
        alert("Valid price aur market price enter karo ❌");
        return;
      }
      data.price = price;
      data.marketPrice = marketPrice;
      data.sizes = null;
    } else {
      data.price = null;
      data.marketPrice = null;
      data.sizes = {
        small:{
          price:numberValue(document.getElementById(`edit-small-${id}`)?.value),
          market:numberValue(document.getElementById(`edit-small-market-${id}`)?.value)
        },
        medium:{
          price:numberValue(document.getElementById(`edit-medium-${id}`)?.value),
          market:numberValue(document.getElementById(`edit-medium-market-${id}`)?.value)
        },
        large:{
          price:numberValue(document.getElementById(`edit-large-${id}`)?.value),
          market:numberValue(document.getElementById(`edit-large-market-${id}`)?.value)
        }
      };
      const hasAnyPrice = Object.values(data.sizes).some(size => Number(size.price) > 0 && Number(size.market) > 0);
      if(!hasAnyPrice){
        alert("At least ek size ka valid price aur market price enter karo ❌");
        return;
      }
    }

    await updateDoc(doc(db,"dishes",id), data);
    alert("Dish updated ✅");
  }catch(error){
    console.error(error);
    alert("Update error: " + error.message);
  }
}

/* DELETE */
window.del = async(id)=>{
  await deleteDoc(doc(db,"dishes",id));
}

/* CATEGORY DELETE */
window.deleteCategory = async(id,name)=>{
  const q = await getDocs(collection(db,"dishes"));

  q.forEach(async d=>{
    if(d.data().category===name){
      await deleteDoc(doc(db,"dishes",d.id));
    }
  });

  await deleteDoc(doc(db,"categories",id));
}

/* CATEGORY TOGGLE */
window.toggleCat = async(id,c)=>{
  await updateDoc(doc(db,"categories",id),{active:!c});
}

window.showSection = function(name){

  document.getElementById("dashboardSection").style.display = "none";
  document.getElementById("categorySection").style.display = "none";
  document.getElementById("dishSection").style.display = "none";
  document.getElementById("ordersSection").style.display = "none";

  if(name === "dashboard"){
    document.getElementById("dashboardSection").style.display = "block";
  }

  if(name === "category"){
    document.getElementById("categorySection").style.display = "block";
  }

  if(name === "dish"){
    document.getElementById("dishSection").style.display = "block";
  }

  if(name === "orders"){
    document.getElementById("ordersSection").style.display = "block";
  }

}
